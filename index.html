<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Östenssons Butiksportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── ÖSTENSSONS BRAND TOKENS ─────────────────────────
   Primär:   #1e4d2b  (djup skogsgrönt)
   Accent:   #2d6e3e  (mellangrönt)
   Ljus:     #e8f2eb  (ljusgrön tint)
   Bkg:      #f5f2ec  (varm beige — som deras hemsida)
   Kort:     #fdfcf9  (varm vit)
   Text:     #1a1a18
   Serif:    Playfair Display (rubriker)
   Sans:     Inter (brödtext / data)
──────────────────────────────────────────────────── */
:root{
  --ö-green:   #1e4d2b;
  --ö-mid:     #2d6e3e;
  --ö-light:   #e8f2eb;
  --ö-bkg:     #f5f2ec;
  --ö-card:    #fdfcf9;
  --ö-border:  #dedad2;
  --ö-text:    #1a1a18;
  --ö-muted:   #7a7870;
  --ö-serif:   'Playfair Display', Georgia, serif;
  --ö-sans:    'Inter', -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ö-sans);background:var(--ö-bkg);color:var(--ö-text);font-size:14px;min-height:100vh}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  background:var(--ö-green);
  background-image: radial-gradient(ellipse at 60% 20%, #2d6e3e 0%, #1e4d2b 55%, #122d1a 100%);
}
.lbox{background:var(--ö-card);border:1px solid var(--ö-border);border-radius:16px;padding:2.25rem 2rem;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.lbrand{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem}
.lbrand-mark{width:36px;height:36px;background:var(--ö-green);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lbrand-mark svg{width:20px;height:20px;fill:#fff}
.lbrand-name{font-family:var(--ö-serif);font-size:17px;font-weight:600;color:var(--ö-green);line-height:1.2}
.lbrand-sub{font-size:10px;color:var(--ö-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.ltitle{font-family:var(--ö-serif);font-size:22px;font-weight:600;color:var(--ö-text);margin-bottom:.25rem}
.lsub{font-size:13px;color:var(--ö-muted);margin-bottom:1.5rem}
.fld{margin-bottom:.875rem}
.fld label{display:block;font-size:11px;color:var(--ö-muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.fld select,.fld input{width:100%;background:#f8f7f3;border:1px solid var(--ö-border);border-radius:8px;padding:9px 11px;color:var(--ö-text);font-family:var(--ö-sans);font-size:14px;outline:none;transition:border-color .15s}
.fld select:focus,.fld input:focus{border-color:var(--ö-mid);box-shadow:0 0 0 3px rgba(45,110,62,.12)}
.btn-g{background:var(--ö-green);color:#fff;border:none;border-radius:8px;padding:11px 16px;font-family:var(--ö-sans);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.02em}
.btn-g:hover{background:var(--ö-mid)}.btn-g:active{transform:scale(.98)}.btn-g.full{width:100%;margin-top:.25rem}
.hint{font-size:11px;color:var(--ö-muted);margin-top:.875rem;text-align:center}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;background:var(--ö-green);position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.topbar-l{display:flex;align-items:center;gap:.875rem}
.tlogo{display:flex;align-items:center;gap:8px}
.tlogo-mark{width:26px;height:26px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center}
.tlogo-mark svg{width:14px;height:14px;fill:#fff}
.tlogo-text{font-family:var(--ö-serif);font-size:15px;font-weight:600;color:#fff;letter-spacing:.01em}
.spill{background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(4px)}
.sdot{width:5px;height:5px;border-radius:50%;background:#7ee89a}
.ghost{background:none;border:none;font-family:var(--ö-sans);font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;padding:5px 10px;border-radius:6px;transition:all .12s}
.ghost:hover{background:rgba(255,255,255,.12);color:#fff}
.nav{display:flex;padding:0 1.25rem;background:var(--ö-card);border-bottom:1px solid var(--ö-border);overflow-x:auto;gap:2px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ni{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ö-muted);border-bottom:2px solid transparent;transition:color .12s,border-color .12s;white-space:nowrap;user-select:none}
.ni:hover{color:var(--ö-text)}.ni.active{color:var(--ö-green);border-bottom-color:var(--ö-green);font-weight:600}
.content{padding:1.25rem;max-width:960px;margin:0 auto;width:100%}
.panel{display:none}.panel.active{display:block}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.pt{font-family:var(--ö-serif);font-size:19px;font-weight:600;color:var(--ö-green)}
.ps{font-size:12px;color:var(--ö-muted);margin-top:3px}

/* CARDS */
.card{background:var(--ö-card);border:1px solid var(--ö-border);border-radius:14px;overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-head{padding:.75rem 1rem;border-bottom:1px solid var(--ö-border);display:flex;align-items:center;justify-content:space-between;background:#f3f0e9}
.ct{font-size:13px;font-weight:600;color:var(--ö-green)}.cs{font-size:11px;color:var(--ö-muted);margin-top:1px}

/* VIEW TOGGLE */
.vtog{display:flex;background:#ece9e1;border-radius:8px;padding:3px;gap:2px;width:fit-content;border:1px solid var(--ö-border)}
.vtog-btn{padding:5px 14px;border-radius:6px;border:none;font-family:var(--ö-sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--ö-muted);background:none;transition:all .15s}
.vtog-btn.active{background:var(--ö-green);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* KPI TILES */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px;margin-bottom:1rem}
.ktile{background:var(--ö-card);border:1px solid var(--ö-border);border-radius:12px;padding:.875rem;box-shadow:0 1px 4px rgba(0,0,0,.04);position:relative;overflow:hidden}
.ktile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ö-green)}
.kl{font-size:10px;color:var(--ö-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.kv{font-size:22px;font-weight:600;line-height:1;margin-bottom:3px;font-family:var(--ö-sans)}
.kt{font-size:11px;color:var(--ö-muted)}
.kbar{height:3px;background:var(--ö-light);border-radius:2px;margin-top:8px}
.kfill{height:100%;border-radius:2px}

/* TABLES */
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-size:10px;font-weight:700;color:var(--ö-muted);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;background:#f0ede6;border-bottom:1px solid var(--ö-border);text-align:left}
.dtbl th.num{text-align:right}.dtbl td{padding:8px 10px;border-bottom:1px solid #eeebe3;font-size:13px;vertical-align:middle}
.dtbl tr:last-child td{border-bottom:none}.dtbl tr:hover td{background:#f8f6f0}
.dtbl td.num{text-align:right;font-family:'SF Mono',monospace;font-size:12px}
.dept-name{font-weight:500}.dept-code{font-size:11px;color:var(--ö-muted)}

/* TOGGLES & INPUTS */
.toggle-btn{width:34px;height:19px;border-radius:10px;border:none;cursor:pointer;transition:background .2s;position:relative;flex-shrink:0}
.toggle-btn.on{background:var(--ö-green)}.toggle-btn.off{background:#ccc9bf}
.toggle-btn::after{content:'';position:absolute;top:2.5px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-btn.on::after{left:18px}.toggle-btn.off::after{left:2.5px}
.num-inp{background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:4px 7px;font-family:'SF Mono',monospace;font-size:12px;color:var(--ö-text);width:72px;outline:none;text-align:right;transition:border-color .15s}
.num-inp:focus{border-color:var(--ö-mid);box-shadow:0 0 0 2px rgba(45,110,62,.1)}.num-inp:disabled{opacity:.3;cursor:not-allowed}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.pg{background:#d6eddb;color:#1a5c28}.pa{background:#fef0dc;color:#944f00}.pr{background:#fde8e8;color:#a01a1a}.pn{background:#ede9e1;color:#666}

/* GOAL TILES */
.goals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;padding:1rem}
.goal-tile{background:#f3f0e9;border:1px solid var(--ö-border);border-radius:10px;padding:.875rem}
.gt-label{font-size:10px;color:var(--ö-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:700}
.gt-inp-wrap{display:flex;align-items:center;gap:6px}
.gt-inp{background:var(--ö-card);border:1px solid var(--ö-border);border-radius:6px;padding:6px 9px;font-family:'SF Mono',monospace;font-size:15px;font-weight:600;color:var(--ö-text);width:100%;outline:none;transition:border-color .15s}
.gt-inp:focus{border-color:var(--ö-mid);box-shadow:0 0 0 2px rgba(45,110,62,.1)}.gt-unit{font-size:11px;color:var(--ö-muted);white-space:nowrap}

/* ACTIONS */
.act-section{border-bottom:1px solid var(--ö-border)}.act-section:last-child{border-bottom:none}
.act-sect-head{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1rem;background:#f3f0e9;cursor:pointer;user-select:none}
.act-sect-head:hover{background:#ede9e1}
.act-sect-name{font-size:12px;font-weight:600;color:var(--ö-green)}.act-sect-meta{font-size:11px;color:var(--ö-muted);margin-left:8px}
.act-sect-body{display:none}.act-sect-body.open{display:block}
.act-row{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid #eeebe3}
.act-row:last-of-type{border-bottom:none}
.act-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--ö-border);flex-shrink:0;margin-top:2px;cursor:pointer;transition:background .12s,border-color .12s}
.act-check.on{background:var(--ö-green);border-color:var(--ö-green);display:flex;align-items:center;justify-content:center}
.act-check.on::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.act-body{flex:1;min-width:0}
.act-inp{width:100%;background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:5px 8px;font-family:var(--ö-sans);font-size:13px;color:var(--ö-text);outline:none;transition:border-color .15s}
.act-inp:focus{border-color:var(--ö-mid)}
.act-cond{width:100%;background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:4px 8px;font-family:var(--ö-sans);font-size:11px;color:var(--ö-muted);outline:none;margin-top:4px;transition:border-color .15s}
.act-cond:focus{border-color:var(--ö-mid)}
.act-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;flex-shrink:0;margin-top:3px}
.at-fix{background:#d6eddb;color:#1a5c28}.at-goal{background:#fef0dc;color:#944f00}
.act-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;transition:color .12s}
.act-del:hover{color:#c62828}
.sect-label{padding:5px 1rem 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sl-fix{background:#e4f0e6;color:#1a5c28}.sl-goal{background:#fef4e4;color:#944f00}

/* UPLOAD */
.uzone{border:2px dashed var(--ö-border);border-radius:14px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:.875rem;background:#f8f7f2}
.uzone:hover,.udrag{border-color:var(--ö-mid) !important;background:var(--ö-light) !important}

/* PERIOD */
.period-row{display:flex;align-items:center;gap:.625rem;padding:.625rem 1rem;border-bottom:1px solid var(--ö-border);flex-wrap:wrap}
.period-row:last-child{border-bottom:none}
.period-name-inp{background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:5px 8px;font-family:var(--ö-sans);font-size:13px;font-weight:500;color:var(--ö-text);outline:none;width:150px;transition:border-color .15s}
.period-name-inp:focus{border-color:var(--ö-mid)}
.week-inp{background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:5px 7px;font-family:'SF Mono',monospace;font-size:12px;color:var(--ö-text);outline:none;width:52px;text-align:center;transition:border-color .15s}
.week-inp:focus{border-color:var(--ö-mid)}

/* EMAIL TAGS */
.email-tag{display:inline-flex;align-items:center;gap:4px;background:var(--ö-light);color:var(--ö-green);border-radius:20px;padding:3px 8px 3px 10px;font-size:12px;font-weight:500;margin:2px;border:1px solid #c0dbc5}
.email-tag-del{background:none;border:none;color:var(--ö-mid);cursor:pointer;font-size:14px;line-height:1;padding:0 1px}
.email-tag-del:hover{color:#c62828}
.email-add-wrap{display:flex;gap:.5rem;align-items:center;margin-top:6px}
.email-add-inp{background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:6px 9px;font-family:var(--ö-sans);font-size:13px;color:var(--ö-text);outline:none;flex:1;transition:border-color .15s}
.email-add-inp:focus{border-color:var(--ö-mid)}

/* BUTTONS */
.btn-sm{background:#ede9e1;border:1px solid var(--ö-border);border-radius:6px;padding:5px 12px;font-family:var(--ö-sans);font-size:12px;color:#555;cursor:pointer;transition:background .12s;white-space:nowrap;font-weight:500}
.btn-sm:hover{color:var(--ö-text);background:#e3dfd6}.btn-sm.green{background:var(--ö-green);border-color:var(--ö-green);color:#fff;font-weight:600}.btn-sm.green:hover{background:var(--ö-mid)}
.btn-sm.red{color:#a01a1a;border-color:#f5c0c0;background:#fef5f5}

/* STORE CARDS */
.store-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:1rem}
.sc{background:var(--ö-card);border:1px solid var(--ö-border);border-radius:14px;padding:.875rem 1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sc:hover{border-color:var(--ö-mid);box-shadow:0 4px 16px rgba(30,77,43,.12)}
.sc-name{font-family:var(--ö-serif);font-size:14px;font-weight:600;margin-bottom:8px;color:var(--ö-green)}
.sc-kpis{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sc-kpi{background:#f3f0e9;border-radius:7px;padding:5px 8px;border:1px solid var(--ö-border)}
.sc-kl{font-size:10px;color:var(--ö-muted);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}.sc-kv{font-size:13px;font-weight:600}

/* SUMMARY TABLE */
.summary-tbl{width:100%;border-collapse:collapse}
.summary-tbl th{font-size:10px;font-weight:700;color:var(--ö-muted);text-transform:uppercase;letter-spacing:.07em;padding:7px 8px;background:#f0ede6;border-bottom:1px solid var(--ö-border);text-align:right}
.summary-tbl th:first-child{text-align:left}
.summary-tbl td{padding:7px 8px;border-bottom:1px solid #eeebe3;font-size:12px;vertical-align:middle}
.summary-tbl tr:last-child td{border-bottom:none}
.summary-tbl td:not(:first-child){text-align:right;font-family:'SF Mono',monospace}
.summary-tbl .dept-head-row td{background:#f0ede6;font-size:12px;padding:7px 8px}
.summary-tbl .act-sub-row td{background:#f9f8f4;font-size:11px;color:var(--ö-muted);padding:3px 8px 3px 22px}

/* TOAST */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--ö-green);color:#fff;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transform:translateY(12px);opacity:0;transition:all .2s;z-index:999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div id="login">
<div class="lbox">
  <div class="lbrand">
    <div class="lbrand-mark">
      <!-- leaf / Ö monogram -->
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2C6 2 3 5.5 3 10s3 8 7 8 7-3.5 7-8-3-8-7-8zm0 13.5c-3 0-5.5-2.5-5.5-5.5S7 4.5 10 4.5 15.5 7 15.5 10 13 15.5 10 15.5z"/>
        <path d="M10 6.5v7M7 10h6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="lbrand-name">Östenssons</div>
      <div class="lbrand-sub">Butiksportal</div>
    </div>
  </div>
  <div class="ltitle">Logga in</div>
  <div class="lsub">Välj roll och butik</div>
  <div class="fld"><label>Roll</label>
    <select id="role-sel" onchange="roleChange()">
      <option value="">— Välj roll —</option>
      <option value="admin">Admin / Central</option>
      <option value="store">Butik / Avdelningsansvarig</option>
    </select>
  </div>

    <select id="store-sel">
      <option value="">— Välj butik —</option>
      <option value="4730">Hemköp Motala Verkstan</option>
      <option value="4732">Hemköp Motala Väster</option>
      <option value="4734">Hemköp Borensberg</option>
      <option value="4735">Hemköp Vadstena Starby</option>
      <option value="4736">Hemköp Vadstena Mima</option>
      <option value="4737">Hemköp Skänninge</option>
      <option value="4738">Hemköp Ullstämma</option>
      <option value="4756">Hemköp Norrk Björkalund</option>
      <option value="4757">Hemköp Lkpg Folkungavallen</option>
    </select>
  </div>
  <div class="fld"><label>PIN-kod</label>
    <input type="password" id="pin-in" placeholder="••••" maxlength="4" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-g full" onclick="login()">Logga in</button>
</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="tlogo">
        <div class="tlogo-mark">
          <svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7" cy="7" r="5.5" stroke="#fff" stroke-width="1.5" fill="none"/>
            <path d="M7 3.5v7M4.5 7h5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="tlogo-text">Östenssons</span>
      </div>
      <span class="spill"><span class="sdot"></span><span id="store-lbl"></span></span>
    </div>
    <button class="ghost" onclick="logout()">Logga ut</button>
  </div>
  <div class="nav" id="nav"></div>
  <div class="content">
    <div class="panel active" id="panel-overview"></div>
    <div class="panel" id="panel-storemål"></div>
    <div class="panel" id="panel-deptmål"></div>
    <div class="panel" id="panel-actions"></div>
    <div class="panel" id="panel-pdf"></div>
    <div class="panel" id="panel-upload-försäljning"></div>
    <div class="panel" id="panel-upload-svinn"></div>
    <div class="panel" id="panel-perioder"></div>
    <div class="panel" id="panel-admin"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>

// Generiska CRUD-hjälpare
async function sbGet(table, match={}) {
  let q = sb.from(table).select('*');
  Object.entries(match).forEach(([k,v]) => q = q.eq(k,v));
  const {data,error} = await q;
  if(error) console.error('sbGet',table,error);
  return data||[];
}
async function sbUpsert(table, row) {
  const {error} = await sb.from(table).upsert(row, {onConflict: Object.keys(row)[0]});
  if(error) console.error('sbUpsert',table,error);
}
async function sbDelete(table, match) {
  let q = sb.from(table).delete();
  Object.entries(match).forEach(([k,v]) => q = q.eq(k,v));
  const {error} = await q;
  if(error) console.error('sbDelete',table,error);
}

// Ladda ALL data från Supabase vid inloggning
async function loadAllFromSupabase() {
  showLoadingOverlay('Hämtar data...');
  try {
    // Store settings
    const settings = await sbGet('store_settings');
    settings.forEach(row => {
      if(!DB[row.store_id]) DB[row.store_id] = defaultSD();
      DB[row.store_id].storeGoals = row.store_goals || DB[row.store_id].storeGoals;
      DB[row.store_id].deptGoals  = row.dept_goals  || DB[row.store_id].deptGoals;
      DB[row.store_id].emails     = row.emails       || [];
    });

    // Actions
    const actions = await sbGet('actions');
    actions.forEach(row => {
      if(!DB[row.store_id]) DB[row.store_id] = defaultSD();
      DB[row.store_id].actions[row.dept_code] = row.data || [];
    });

    // Försäljning
    const reports = await sbGet('report_data');
    reports.forEach(row => { REPORT_DB[row.period_key] = row.data; });

    // Svinn
    const svinn = await sbGet('svinn_data');
    svinn.forEach(row => { SVINN_DB[row.period_key] = row.data; });

    // Perioder
    const periods = await sbGet('periods');
    PERIODS = periods.map(p => ({id:p.id, name:p.name, year:p.year, weekFrom:p.week_from, weekTo:p.week_to}));

    // PINs
    const pins = await sbGet('pins');
    pins.forEach(row => { PINS[row.store_id] = row.pin; });

  } catch(e) {
    console.error('loadAllFromSupabase', e);
    toast('⚠ Kunde inte hämta data från databasen');
  }
  hideLoadingOverlay();
}

// Loading overlay
function showLoadingOverlay(msg='Laddar...') {
  let el = document.getElementById('sb-loading');
  if(!el) {
    el = document.createElement('div');
    el.id = 'sb-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(30,77,43,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;backdrop-filter:blur(4px)';
    el.innerHTML = `<div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite"></div>
      <div style="color:#fff;font-family:var(--ö-sans);font-size:14px;font-weight:500" id="sb-loading-msg">${msg}</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    document.body.appendChild(el);
  } else {
    document.getElementById('sb-loading-msg').textContent = msg;
    el.style.display = 'flex';
  }
}
function hideLoadingOverlay() {
  const el = document.getElementById('sb-loading');
  if(el) el.style.display = 'none';
}

// ── DATA HELPERS ──────────────────────────────────────
function periodKey(yr,wk){return`${yr}-V${String(wk).padStart(2,'0')}`;}
function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/864e5)+1)/7);}

function getLatestWeekData(storeId){
  const keys=Object.keys(REPORT_DB).sort().reverse();
  for(const k of keys)if(REPORT_DB[k][storeId])return{pk:k,...REPORT_DB[k][storeId]};
  return null;
}

function getAccData(storeId,period){
  if(!period)return null;
  let totF=0,totBvKr=0,dAcc={},found=0;
  for(let w=period.weekFrom;w<=period.weekTo;w++){
    const pk=periodKey(period.year,w);
    const pd=REPORT_DB[pk]?.[storeId];
    if(!pd)continue;
    found++;totF+=pd.forsaljning||0;totBvKr+=pd.bvKr||0;
    (pd.depts||[]).forEach(d=>{
      if(!dAcc[d.code])dAcc[d.code]={code:d.code,name:d.name,forsaljning:0,bvKr:0};
      dAcc[d.code].forsaljning+=d.forsaljning||0;dAcc[d.code].bvKr+=d.bvKr||0;
    });
  }
  if(!found)return null;
  const bvPct=totF>0?totBvKr/totF:null;
  const depts=Object.values(dAcc).map(d=>({...d,bvPct:d.forsaljning>0?d.bvKr/d.forsaljning:null}));
  return{forsaljning:totF,bvKr:totBvKr,bvPct,depts,found,total:period.weekTo-period.weekFrom+1};
}

function fmtKr(v){if(v==null)return'—';return Math.round(v).toLocaleString('sv-SE')+' kr';}
function fmtPct(v,d=1){if(v==null)return'—';return(v*100).toFixed(d)+'%';}
function fmtDelta(v){if(v==null)return'—';return(v>=0?'+':'')+(v*100).toFixed(1)+'%';}
function pctColor(val,goal,lb){
  if(val==null||goal==null)return'#aaa';
  if(lb)return val<=goal?'#3d6e10':val<=goal*1.15?'#c65000':'#c62828';
  return val>=goal*0.95?'#3d6e10':val>=goal*0.80?'#c65000':'#c62828';
}

function selectAllWeeks(){
  Object.keys(REPORT_DB).forEach(pk => selWeeks.add(pk));
  renderPanel('overview');

function selectPeriodPreset(periodId){
  if(!periodId) return;
  const p = PERIODS.find(x=>x.id===periodId);
  if(!p) return;
  selWeeks.clear();
  for(let w=p.weekFrom; w<=p.weekTo; w++){
    const pk = periodKey(p.year, w);
    if(REPORT_DB[pk]) selWeeks.add(pk);
  }
  renderPanel('overview');
}

// Ersätter gamla getAccData — nu baserat på selWeeks
function getAccDataFromWeeks(storeId, weeks){
  if(!weeks||weeks.size===0) return null;
  let totF=0,totBvKr=0,totAntalSum=0,totAntalCount=0,omsSum=0,omsCount=0,dAcc={},found=0;
  weeks.forEach(pk => {
    const pd=REPORT_DB[pk]?.[storeId];
    if(!pd)return;
    found++;
    totF    += pd.forsaljning||0;
    totBvKr += pd.bvKr||0;
    if(pd.antalDelta!=null){totAntalSum+=pd.antalDelta;totAntalCount++;}
    if(pd.forsaljningDelta!=null){omsSum+=pd.forsaljningDelta;omsCount++;}
    (pd.depts||[]).forEach(d=>{
      if(!dAcc[d.code])dAcc[d.code]={code:d.code,name:d.name,forsaljning:0,bvKr:0,antalDeltas:[],forsaljningDeltas:[]};
      dAcc[d.code].forsaljning+=d.forsaljning||0;
      dAcc[d.code].bvKr+=d.bvKr||0;
      if(d.antalDelta!=null)dAcc[d.code].antalDeltas.push(d.antalDelta);
      if(d.forsaljningDelta!=null)dAcc[d.code].forsaljningDeltas.push(d.forsaljningDelta);
    });
  });
  if(!found)return null;
  const bvPct          = totF>0 ? totBvKr/totF : null;
  const antalDelta     = totAntalCount>0 ? totAntalSum/totAntalCount : null;
  const forsaljningDelta = omsCount>0 ? omsSum/omsCount : null;
  const depts=Object.values(dAcc).map(d=>({
    ...d,
    bvPct:           d.forsaljning>0 ? d.bvKr/d.forsaljning : null,
    antalDelta:      d.antalDeltas.length>0 ? d.antalDeltas.reduce((a,b)=>a+b,0)/d.antalDeltas.length : null,
    forsaljningDelta:d.forsaljningDeltas.length>0 ? d.forsaljningDeltas.reduce((a,b)=>a+b,0)/d.forsaljningDeltas.length : null,
  }));
  return{forsaljning:totF, bvKr:totBvKr, bvPct, forsaljningDelta, antalDelta, depts, found, total:weeks.size};
}

function getSvinnPct(storeId, weeks) {
  // Beräkna känt svinn% = svinnKr / omsättning för valda veckor
  let totSvinnKr=0, totForsaljning=0;
  const wks = weeks && weeks.size>0 ? weeks : new Set(Object.keys(REPORT_DB).sort().slice(-1));
  wks.forEach(pk => {
    const svinnRows = SVINN_DB[pk]?.[storeId];
    const repData   = REPORT_DB[pk]?.[storeId];
    if(svinnRows) totSvinnKr   += svinnRows.reduce((s,r)=>s+(r.svinnKr||0),0);
    if(repData)   totForsaljning += repData.forsaljning||0;
  });
  return totForsaljning>0 ? totSvinnKr/totForsaljning : null;
}

function renderKPIGrid(sd, data, storeId) {
  const curSid = storeId || sid;
  const svinnPct = getSvinnPct(curSid, viewMode==='period'?selWeeks:null);

  return`<div class="kgrid">${STORE_KPI_DEFS.map(k=>{
    const goal = sd.storeGoals[k.key];
    let val = null;
    if(data) {
      if(k.key==='oms')      val = data.forsaljningDelta;
      else if(k.key==='marginal') val = data.bvPct;
      else if(k.key==='antal')    val = data.antalDelta;
    }
    if(k.key==='svinn_k') val = svinnPct;

    // Färgjämförelse: goal är i % (t.ex. 7), val är decimal (t.ex. 0.07) för delta/pct från rapport
    // svinn_k: goal är i % (0.7), val är decimal
    const goalDec = goal/100;
    const color = pctColor(val, goalDec, k.lb);

    // Formatera utfall
    let display = '—';
    if(val!=null) {
      if(k.fmt==='delta') display = fmtDelta(val);
      else display = fmtPct(val);
    }

    // Progressbar: hur nära målet (0–100%)
    let barWidth = 50;
    if(val!=null && goalDec!==0) {
      barWidth = Math.min(Math.abs(val/goalDec)*100, 100);
    }

    return`<div class="ktile">
      <div class="kl">${k.label}</div>
      <div class="kv" style="color:${val!=null?color:'var(--ö-text)'}">${val!=null?display:`${goal}%`}</div>

    </div>`;
  }).join('')}</div>`;
}

function procF(file){
  const yr=parseInt(document.getElementById('fy')?.value)||new Date().getFullYear();
  const wk=parseInt(document.getElementById('fw')?.value)||getWeekNum(new Date());
  const pk=periodKey(yr,wk);
  const prog=document.getElementById('fp'),pmsg=document.getElementById('fpm');
  if(prog){prog.style.display='block';pmsg.textContent=`Läser ${file.name}...`;}
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      pmsg.textContent='Tolkar Excel...';
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      if(REPORT_DB[pk]&&!confirm(`${pk} finns redan. Ersätta?`)){prog.style.display='none';return;}
      const pd={};let cs=null;
      for(const row of rows){
        const c0=row[0],c1=row[1],c2=row[2],c3=row[3];
        if(c0&&String(c0).trim().match(/^\d{4}$/)&&c1){cs=String(c0).trim();pd[cs]={name:c1,
            forsaljning:row[6]!=null?parseFloat(row[6]):null,
            forsaljningDelta:row[7]!=null?parseFloat(row[7]):null,
            antalSt:row[8]!=null?parseFloat(row[8]):null,
            antalDelta:row[9]!=null?parseFloat(row[9]):null,
            bvKr:row[10]!=null?parseFloat(row[10]):null,
            bvPct:row[11]!=null?parseFloat(row[11]):null,
            depts:[]};}
        else if(cs&&!c0&&!c1&&c2&&String(c2).trim().match(/^\d{1,2}$/)&&c3){pd[cs].depts.push({code:String(c2).trim().padStart(2,'0'),name:c3,
            forsaljning:row[6]!=null?parseFloat(row[6]):null,
            forsaljningDelta:row[7]!=null?parseFloat(row[7]):null,
            antalSt:row[8]!=null?parseFloat(row[8]):null,
            antalDelta:row[9]!=null?parseFloat(row[9]):null,
            bvKr:row[10]!=null?parseFloat(row[10]):null,
            bvPct:row[11]!=null?parseFloat(row[11]):null});}
      }
      REPORT_DB[pk]=pd;Object.entries(pd).forEach(([id,d])=>getSD(id).reportData=d);
      const sc=Object.keys(pd).length,dc=Object.values(pd).reduce((s,d)=>s+(d.depts?.length||0),0);
      const hasAntal=Object.values(pd).some(d=>d.antalDelta!=null);
      await saveReportPeriod(pk);
      prog.style.display='none';
      toast(`${pk} inläst — ${sc} butiker, ${dc} avdelningar${hasAntal?' · Antal sålda ✓':' · ⚠ Antal sålda saknas'}`);
      renderUploadFörsäljning();
    }catch(err){pmsg.textContent='Fel: '+err.message;}
  };reader.readAsArrayBuffer(file);
}

function generatePDF(storeId,pdfMode){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const sd=getSD(storeId),storeName=STORES[storeId],week=getWeekNum(new Date());
  const wData=getLatestWeekData(storeId);
  const aData=(pdfMode==='period'||pdfMode==='both')?getAccDataFromWeeks(storeId,selWeeks):null;
  const wksArr=[...selWeeks].sort();
  const periodLabel=selWeeks.size===1?wksArr[0].replace('-V',' V'):selWeeks.size>1?`${wksArr[0].replace('-V',' V')}–${wksArr[wksArr.length-1].replace('-V',' V')}`:'—';
  const W=210,M=16;
  const G=[30,77,43],GL=[214,237,219],DK=[26,26,24],GR=[122,120,112],LG=[243,240,233],AM=[254,240,220];
  let y=0;

  // Header
  doc.setFillColor(...G);doc.rect(0,0,W,18,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('ÖSTENSSONS BUTIKSPORTAL',M,7);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(`${storeName}  ·  Vecka ${week}`,W-M,7,{align:'right'});
  doc.setFontSize(8);doc.text(`Genererad ${new Date().toLocaleDateString('sv-SE')}`,W-M,13,{align:'right'});
  y=26;

  // Title
  doc.setTextColor(...G);doc.setFont('helvetica','bold');doc.setFontSize(20);doc.text(storeName,M,y);y+=7;
  const ml=pdfMode==='week'?`Föregående vecka${wData?.pk?' ('+wData.pk+')':''}`:pdfMode==='period'?`Ackumulerat: ${periodLabel}`:`Vecka & Ackumulerat: ${periodLabel}`;
  doc.setTextColor(...GR);doc.setFont('helvetica','normal');doc.setFontSize(10);doc.text(`Veckorapport · ${ml} · Östenssons`,M,y);y+=5;
  doc.setDrawColor(220,220,218);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=8;

  // KPI tiles function
  function kpiSection(data,label){
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DK);doc.text(label,M,y);y+=5;
    const svinnPct = getSvinnPct(storeId, viewMode==='period'?selWeeks:null);
    const kpis=STORE_KPI_DEFS,tW=(W-2*M-5*3)/3,tH=20;
    const vals={
      oms:      data?.forsaljningDelta!=null?`${(data.forsaljningDelta*100).toFixed(1)}%`:'—',
      marginal: data?.bvPct!=null?`${(data.bvPct*100).toFixed(1)}%`:'—',
      svinn_k:  svinnPct!=null?`${(svinnPct*100).toFixed(2)}%`:'—',
      antal:    data?.antalDelta!=null?`${data.antalDelta>=0?'+':''}${(data.antalDelta*100).toFixed(1)}%`:'—',
      kvitton:  '—',
    };
    for(let i=0;i<kpis.length;i++){
      const col=i%3,row=Math.floor(i/3),tx=M+col*(tW+3),ty=y+row*(tH+3),k=kpis[i],val=vals[k.key],goal=sd.storeGoals[k.key];
      doc.setFillColor(...LG);doc.roundedRect(tx,ty,tW,tH,2,2,'F');
      doc.setTextColor(...GR);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.text(k.label.toUpperCase(),tx+4,ty+5);
      doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...G);doc.text(val!=='—'?val:`${goal}${k.unit.includes('%')?'%':''}`,tx+4,ty+13);
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...GR);doc.text(`Mål: ${goal}${k.unit.includes('%')?'%':''}`,tx+4,ty+18);
    }
    y+=2*tH+2*3+8;
  }

  if(pdfMode==='week'||pdfMode==='both')kpiSection(wData,`Nyckeltal — föregående vecka${wData?.pk?' ('+wData.pk+')':''}`);
  if((pdfMode==='period'||pdfMode==='both')&&aData)kpiSection(aData,`Nyckeltal — ackumulerat (${periodLabel}) · ${aData.found} veckor`);

  if(y>240){doc.addPage();y=20;}

  // Per-dept with dual columns and actions
  const active=DEPTS.filter(d=>sd.deptGoals[d.code]?.active);
  if(active.length>0){
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...DK);doc.text('Avdelningsmål & Actions',M,y);y+=5;
    active.forEach(d=>{
      const dg=sd.deptGoals[d.code];
      const rdW=wData?.depts?.find(x=>x.code===d.code);
      const rdA=aData?.depts?.find(x=>x.code===d.code);
      const acts=sd.actions[d.code]||[];
      const fixed=acts.filter(a=>a.type==='fixed'),goal=acts.filter(a=>a.type==='goal');

      // Build columns based on mode
      const lblRow=[],valRow=[];
      lblRow.push({content:'Mål Oms%',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
      lblRow.push({content:'Mål Marg%',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
      lblRow.push({content:'Mål Svinn%',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
      valRow.push({content:`${dg.oms}%`,styles:{fontStyle:'bold',fontSize:9,textColor:G}});
      valRow.push({content:`${dg.marginal}%`,styles:{fontStyle:'bold',fontSize:9,textColor:G}});
      valRow.push({content:`${dg.svinn}%`,styles:{fontStyle:'bold',fontSize:9,textColor:G}});

      if(pdfMode==='week'||pdfMode==='both'){
        const uO=rdW?.forsaljningDelta!=null?`${(rdW.forsaljningDelta*100).toFixed(1)}%`:'—';
        const uB=rdW?.bvPct!=null?`${(rdW.bvPct*100).toFixed(1)}%`:'—';
        lblRow.push({content:'Vecka Oms',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
        lblRow.push({content:'Vecka BV%',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
        valRow.push({content:uO,styles:{fontStyle:'bold',fontSize:9,textColor:uO==='—'?GR:rdW?.forsaljningDelta>=dg.oms/100?[42,122,10]:[180,60,0]}});

        const aB=rdA?.bvPct!=null?`${(rdA.bvPct*100).toFixed(1)}%`:'—';
        lblRow.push({content:'Ack. förs.',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
        lblRow.push({content:'Ack. BV%',styles:{fontStyle:'bold',fontSize:7,textColor:GR}});
        valRow.push({content:aF,styles:{fontSize:9,textColor:DK}});
        valRow.push({content:aB,styles:{fontStyle:'bold',fontSize:9,textColor:aB==='—'?GR:rdA?.bvPct>=dg.marginal/100?[42,122,10]:[180,60,0]}});
      }

      doc.autoTable({startY:y,margin:{left:M,right:M},
        head:[[{content:`${d.name}  (Avd. ${d.code})`,colSpan:lblRow.length,styles:{fillColor:G,textColor:[255,255,255],fontStyle:'bold',fontSize:8}}]],
        body:[lblRow,valRow],
        styles:{cellPadding:2.5,lineColor:[220,220,218],lineWidth:0.2},
        bodyStyles:{fillColor:LG,textColor:DK},
        columnStyles:Object.fromEntries(lblRow.map((_,i)=>[i,{halign:'center'}])),
      });
      y=doc.lastAutoTable.finalY;

      if(acts.length>0){
        const aRows=[];
        if(fixed.length>0){
          aRows.push([{content:'FASTA RUTINER — ALLTID',colSpan:3,styles:{fillColor:GL,textColor:[42,122,10],fontStyle:'bold',fontSize:7}}]);
          fixed.forEach(a=>aRows.push([{content:'Fast',styles:{textColor:[42,122,10],fontStyle:'bold',fontSize:7,cellWidth:18}},{content:a.text,styles:{fontSize:8,textColor:DK}},{content:a.done?'✓':'○',styles:{halign:'center',fontSize:9,fontStyle:'bold',textColor:a.done?[42,122,10]:GR,cellWidth:12}}]));
        }
        if(goal.length>0){
          aRows.push([{content:'MÅLSTYRDA ÅTGÄRDER — VID AVVIKELSE',colSpan:3,styles:{fillColor:AM,textColor:[180,80,0],fontStyle:'bold',fontSize:7}}]);
          goal.forEach(a=>aRows.push([{content:'Mål',styles:{textColor:[180,80,0],fontStyle:'bold',fontSize:7,cellWidth:18}},{content:a.text+(a.cond?`\n  ${a.cond}`:''),styles:{fontSize:8,textColor:DK}},{content:a.done?'✓':'○',styles:{halign:'center',fontSize:9,fontStyle:'bold',textColor:a.done?[42,122,10]:GR,cellWidth:12}}]));
        }
        doc.autoTable({startY:y,margin:{left:M+4,right:M},body:aRows,columnStyles:{0:{cellWidth:18},1:{cellWidth:'auto'},2:{cellWidth:12}},styles:{cellPadding:2.5,lineColor:[220,220,218],lineWidth:0.15,fontSize:8},bodyStyles:{fillColor:[255,255,255],textColor:DK}});
        y=doc.lastAutoTable.finalY;
      }
      y+=4;if(y>265){doc.addPage();y=20;}
    });
  }

  // Footer
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFillColor(...LG);doc.rect(0,287,W,10,'F');doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...GR);doc.text(`Konfidentiell · ${storeName} · Vecka ${week}`,M,293);doc.text(`Sida ${i} av ${pages}`,W-M,293,{align:'right'});}
  doc.save(`Veckorapport_${storeName.replace(/\s+/g,'_')}_V${week}.pdf`);
  toast('PDF nedladdad ✓');
}

// ── ADMIN ─────────────────────────────────────────────
function renderAdmin(){
  document.getElementById('panel-admin').innerHTML=`
    <div class="ph"><div><div class="pt">Butiksinställningar</div><div class="ps">PIN-koder och mailadresser per butik</div></div></div>

    <div class="card">
      <div class="card-head"><div><div class="ct">PIN-koder</div><div class="cs">Unik inloggningskod per butik — ändras direkt i databasen</div></div></div>

      <div style="padding:.75rem 1rem;border-bottom:1px solid var(--ö-border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;background:#f9f7f2">
        <div style="font-size:13px;font-weight:600;color:var(--ö-green);min-width:180px">Admin</div>
        <div style="display:flex;align-items:center;gap:.5rem;flex:1">
          <input type="password" id="pin-admin" placeholder="Ny PIN-kod" maxlength="10"
            style="background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:6px 9px;font-family:'SF Mono',monospace;font-size:13px;outline:none;width:140px;transition:border-color .15s"
            onfocus="this.type='text'" onblur="this.type='password'">
          <button class="btn-sm green" onclick="updatePIN('admin')">Spara</button>
          <span style="font-size:11px;color:var(--ö-muted)">${PINS['admin']?'●●●●●● (satt)':'Standard (ej satt)'}</span>
        </div>
      </div>

      ${Object.entries(STORES).map(([id,name])=>`
      <div style="padding:.75rem 1rem;border-bottom:1px solid var(--ö-border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <div style="min-width:180px">
          <div style="font-size:13px;font-weight:500">${name.replace('Hemköp ','')}</div>
          <div style="font-size:11px;color:var(--ö-muted)">${id}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;flex:1">
          <input type="password" id="pin-${id}" placeholder="Ny PIN-kod" maxlength="10"
            style="background:#f8f7f3;border:1px solid var(--ö-border);border-radius:6px;padding:6px 9px;font-family:'SF Mono',monospace;font-size:13px;outline:none;width:140px;transition:border-color .15s"
            onfocus="this.type='text'" onblur="this.type='password'"
            onkeydown="if(event.key==='Enter')updatePIN('${id}')">
          <button class="btn-sm green" onclick="updatePIN('${id}')">Spara</button>
          <span style="font-size:11px;color:var(--ö-muted)">${PINS[id]?'●●●●●● (satt)':'Standard (ej satt)'}</span>
        </div>
      </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-head"><div><div class="ct">Mailadresser</div><div class="cs">Rapporten skickas till alla angivna adresser per butik</div></div></div>
      ${Object.entries(STORES).map(([id,name])=>{
        const sd=getSD(id),ad=Object.values(sd.deptGoals).filter(d=>d.active).length,ta=Object.values(sd.actions).flat().length;
        return`<div style="padding:.875rem 1rem;border-bottom:1px solid var(--ö-border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;flex-wrap:wrap;gap:.5rem">
            <div><div style="font-size:13px;font-weight:500">${name.replace('Hemköp ','')}</div><div style="font-size:11px;color:var(--ö-muted)">${id} · ${ad} aktiva avd. · ${ta} actions</div></div>
            <button class="btn-sm" onclick="adminViewStore('${id}')">Redigera →</button>
          </div>
          <div id="etags-${id}" style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">
            ${(sd.emails||[]).length?(sd.emails.map(e=>`<span class="email-tag">${e}<button class="email-tag-del" onclick="rmEmail('${id}','${e}')">×</button></span>`).join('')):`<span style="font-size:12px;color:var(--ö-muted)">Inga mottagare angivna</span>`}
          </div>
          <div class="email-add-wrap">
            <input class="email-add-inp" type="email" id="ne-${id}" placeholder="Lägg till e-postadress..." onkeydown="if(event.key==='Enter')addEmail('${id}')">
            <button class="btn-sm green" onclick="addEmail('${id}')">+ Lägg till</button>
          </div>
        </div>`;}).join('')}
    </div>`;
}

async function updatePIN(id) {
  const inp = document.getElementById(`pin-${id}`);
  const pin = inp?.value?.trim();
  if(!pin || pin.length < 4){ toast('PIN-koden måste vara minst 4 tecken'); return; }
  await savePIN(id, pin);
  PINS[id] = pin;
  inp.value = '';
  toast(`PIN uppdaterad för ${id==='admin'?'Admin':STORES[id]?.replace('Hemköp ','')||id} ✓`);
  renderAdmin();
}
async function addEmail(id){
  const inp=document.getElementById(`ne-${id}`);const email=inp?.value?.trim();
  if(!email||!email.includes('@')){toast('Ange en giltig e-postadress');return;}
  const sd=getSD(id);if(!sd.emails)sd.emails=[];
  if(sd.emails.includes(email)){toast('Adressen finns redan');return;}
  sd.emails.push(email);inp.value='';
  await saveStoreSettings(id);
  const tags=document.getElementById(`etags-${id}`);
  if(tags)tags.innerHTML=sd.emails.map(e=>`<span class="email-tag">${e}<button class="email-tag-del" onclick="rmEmail('${id}','${e}')">×</button></span>`).join('');
  toast(`${email} tillagd ✓`);
}
async function rmEmail(id,email){
  const sd=getSD(id);sd.emails=(sd.emails||[]).filter(e=>e!==email);
  await saveStoreSettings(id);
  const tags=document.getElementById(`etags-${id}`);
  if(tags)tags.innerHTML=sd.emails.length?sd.emails.map(e=>`<span class="email-tag">${e}<button class="email-tag-del" onclick="rmEmail('${id}','${e}')">×</button></span>`).join(''):`<span style="font-size:12px;color:var(--ö-muted)">Inga mottagare angivna</span>`;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
</script>
