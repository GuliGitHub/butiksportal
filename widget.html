<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="900">
<title>Östenssons Butiksrapport</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#002F6D;--red:#E20000;--beige:#E9E5E0;
  --card:#fff;--text:#1a1a18;--muted:#6b6860;--border:#dedad2;
  --green:#1e6b2e;--amber:#b45309;--redd:#c62828;--bkg:#f0ede8;
}
html,body{height:100%;background:var(--bkg);font-family:'DM Sans',sans-serif;color:var(--text)}
.topbar{background:var(--blue);height:58px;display:flex;align-items:stretch;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.t-logo{background:#fff;padding:8px 20px;display:flex;align-items:center;border-right:3px solid rgba(0,47,109,.35);flex-shrink:0}
.t-logo img{height:36px;width:auto}
.t-info{display:flex;align-items:center;gap:1rem;padding:0 1.25rem;flex:1}
.t-store{font-size:15px;font-weight:700;color:#fff}
.t-period{font-size:11px;color:rgba(255,255,255,.55);font-family:'DM Mono',monospace;background:rgba(255,255,255,.1);padding:3px 8px;border-radius:4px}
.t-right{margin-left:auto;display:flex;align-items:center;gap:.75rem;padding:0 1.25rem}
.t-sel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;outline:none}
.t-sel option{color:#1a1a18;background:#fff}
.t-ts{font-size:10px;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace}
.content{padding:1.25rem;max-width:1400px;margin:0 auto}
.sbar{display:flex;align-items:center;gap:.5rem;padding:.5rem .875rem;background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:1rem;font-size:11px;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.sdot.ok{background:var(--green)}.sdot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Store KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.875rem;margin-bottom:.875rem}
.ktile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.125rem 1.25rem;position:relative;overflow:hidden}
.ktile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.klabel{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.kval{font-size:32px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;margin-bottom:.25rem}
.kmeta{font-size:10px;color:var(--muted);margin-bottom:.375rem}
.kbar{height:2.5px;background:var(--beige);border-radius:2px;overflow:hidden}
.kfill{height:100%;border-radius:2px}
/* Secondary */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.625rem;margin-bottom:1.25rem}
.stile{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between}
.sval{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
/* Dept */
.dept-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.625rem}
.dept-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.875rem}
.dept-head{display:flex;align-items:center;gap:.75rem;background:var(--blue);padding:.625rem 1rem}
.dept-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#888}
.dept-dot.green{background:#4caf50}.dept-dot.amber{background:#ff9800}.dept-dot.red{background:#f44336}
.dept-nm{font-size:13px;font-weight:600;color:#fff;flex:1}
.dept-cd{font-size:10px;color:rgba(255,255,255,.5)}
/* 4 KPI boxar */
.dkpis{display:grid;grid-template-columns:repeat(4,1fr)}
.dkpi{padding:.625rem .875rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.dkpi:last-child{border-right:none}
.dkpi-label{font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.dkpi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:3px}
.dkpi-mal{font-size:9.5px;color:var(--muted)}
.dkpi-bar{height:2px;background:var(--beige);border-radius:1px;margin-top:5px;overflow:hidden}
.dkpi-fill{height:100%;border-radius:1px}
/* Actions */
.dept-acts{padding:.625rem 1rem;background:#faf9f6;border-bottom:1px solid var(--border)}
.acts-ttl{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.375rem}
.act-row{display:flex;align-items:flex-start;gap:7px;padding:4px 6px;background:var(--card);border-radius:5px;border-left:3px solid var(--blue);margin-bottom:3px;font-size:11px}
.act-row.done{border-left-color:var(--green)}
.act-check{flex-shrink:0;margin-top:1px;font-size:12px}
/* Top 5 */
.top5-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:.875rem 1rem}
.top5-single{padding:.875rem 1rem}
.top5-ttl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.375rem}
.t5{width:100%;border-collapse:collapse;font-size:11px}
.t5 th{font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:3px 5px 4px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.t5 th:first-child,.t5 th:nth-child(2){text-align:left}
.t5 td{padding:3px 5px;border-bottom:.5px solid var(--border);text-align:right;font-family:'DM Mono',monospace}
.t5 td:first-child{color:var(--muted);text-align:left;width:16px}
.t5 td:nth-child(2){font-family:'DM Sans',sans-serif;text-align:left;color:var(--text)}
.t5 tr:last-child td{border-bottom:none}
.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-red{color:var(--redd)}.c-muted{color:var(--muted)}
.bg-green{background:var(--green)}.bg-amber{background:var(--amber)}.bg-red{background:var(--redd)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--beige);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:1.25rem;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
</style>
</head>

function col(v,m,lb){
  if(v==null||m==null) return 'muted';
  var r=v/(m/100);
  if(lb) return r<=1?'green':r<=1.3?'amber':'red';
  return r>=.95?'green':r>=.80?'amber':'red';
}

function fP(v){ return v==null?'—':(v*100).toFixed(1)+'%'; }
function fK(v){ return v==null?'—':Math.round(v).toLocaleString('sv-SE')+' kr'; }

function ktile(label,v,m,fmt,lb,strict){
  var c=col(v,m,lb,strict), hex=colHex(c);

  var d=fmt==='delta'?fD(v):fmt==='kr_delta'?(v!=null?(v>=0?'+':'')+fK(v):'—'):fP(v);
  var ms=m!=null?'Mål '+m+'%':'—';
  return '<div class="dkpi"><div class="dkpi-label">'+label+'</div><div class="dkpi-val" style="color:'+hex+'">'+d+'</div>'
    +'<div class="dkpi-mal">'+ms+'</div><div class="dkpi-bar"><div class="dkpi-fill" style="background:'+hex+';width:'+bw(v,m)+'%"></div></div></div>';
}

function svinnPctCol(pct){
  if(pct==null) return 'var(--muted)';
  return pct>0.02?'var(--redd)':pct>0.01?'var(--amber)':'var(--green)';
}
function tbPctCol(pct){
  if(pct==null) return 'var(--muted)';
  return pct>=0.28?'var(--green)':pct>=0.20?'var(--amber)':'var(--redd)';
}

function top5SvinnHTML(rows){
  if(!rows.length) return '';
  var h='<div class="top5-ttl">Top 5 svinn kr</div><table class="t5"><thead><tr>'
    +'<th>#</th><th>Artikel</th><th>Oms kr</th><th style="color:var(--redd)">Svinn kr</th><th style="color:var(--redd)">Svinn %</th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(r,i){
    var pctStr=r.svinnPct!=null?(r.svinnPct*100).toFixed(1)+'%':'—';
    var pctCol=svinnPctCol(r.svinnPct);
    h+='<tr><td>'+(i+1)+'</td><td>'+r.artName+'</td>'
      +'<td style="color:var(--muted)">'+(r.artOms>0?fK(r.artOms):'—')+'</td>'
      +'<td style="color:var(--redd);font-weight:600">'+fK(r.svinnKr)+'</td>'
      +'<td style="color:'+pctCol+';font-weight:600">'+pctStr+'</td></tr>';
  });
  return h+'</tbody></table>';
}

function top5TbHTML(rows){
  if(!rows.length) return '';
  var h='<div class="top5-ttl">Top 5 TB kr</div><table class="t5"><thead><tr>'
    +'<th>#</th><th>Artikel</th><th>Oms kr</th><th style="color:var(--green)">TB kr</th><th style="color:var(--green)">TB %</th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(r,i){
    var pctStr=r.bvPct!=null?(r.bvPct*100).toFixed(1)+'%':'—';
    var pctCol=tbPctCol(r.bvPct);
    h+='<tr><td>'+(i+1)+'</td><td>'+r.artName+'</td>'
      +'<td style="color:var(--muted)">'+(r.oms>0?fK(r.oms):'—')+'</td>'
      +'<td style="color:var(--green);font-weight:600">'+fK(r.bvKr)+'</td>'
      +'<td style="color:'+pctCol+';font-weight:600">'+pctStr+'</td></tr>';
  });
  return h+'</tbody></table>';
}

function buildSvinn5(svinnRows, code, eanMap){
  var m={};
  (svinnRows||[]).forEach(function(r){
    var dc = r.deptCode || (eanMap[r.artNr||r.ean]?.dept) || null;
    if(dc!==code) return;
    var k=r.artNr||r.artName||r.ean;
    if(!m[k]) m[k]={artName:r.artName||r.ean,svinnKr:0,artOms:0};
    m[k].svinnKr+=r.svinnKr||0;
    var bi=eanMap[r.artNr||r.ean];
    if(bi&&bi.oms>m[k].artOms) m[k].artOms=bi.oms;
  });
  return Object.values(m).filter(function(a){return a.svinnKr>0;})
    .sort(function(a,b){return b.svinnKr-a.svinnKr;}).slice(0,5)
    .map(function(a){return Object.assign({},a,{svinnPct:a.artOms>0?a.svinnKr/a.artOms:null});});
}

function buildTB5(eanMap, code){
  var arr=[];
  Object.entries(eanMap).forEach(function(e){
    var v=e[1];
    if(v.dept!==code||!v.bvKr||v.bvKr<=0) return;
    arr.push({artName:v.namn||e[0],bvKr:v.bvKr,oms:v.oms||0,bvPct:v.oms>0?v.bvKr/v.oms:null});
  });
  return arr.sort(function(a,b){return b.bvKr-a.bvKr;}).slice(0,5);
}

function aggregate(all){
  var totF=0,totBv=0,omsS=0,omsN=0,bvS=0,bvN=0,antS=0,antN=0,depts={};
  Object.values(all).forEach(function(d){
    if(!d) return;
    totF+=d.forsaljning||0; totBv+=d.bvKr||0;
    if(d.forsaljningDelta!=null){omsS+=d.forsaljningDelta;omsN++;}
    if(d.bvPct!=null){bvS+=d.bvPct;bvN++;}
    if(d.antalDelta!=null){antS+=d.antalDelta;antN++;}
    (d.depts||[]).forEach(function(dep){
      if(!depts[dep.code]) depts[dep.code]={code:dep.code,name:dep.name,forsaljning:0,bvKr:0,fDs:[],bvPs:[],antDs:[]};
      depts[dep.code].forsaljning+=dep.forsaljning||0;
      depts[dep.code].bvKr+=dep.bvKr||0;
      if(dep.forsaljningDelta!=null) depts[dep.code].fDs.push(dep.forsaljningDelta);
      if(dep.bvPct!=null) depts[dep.code].bvPs.push(dep.bvPct);
      if(dep.antalDelta!=null) depts[dep.code].antDs.push(dep.antalDelta);
    });
  });
  function avg(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:null;}
  function norm(v){return v!=null?(Math.abs(v)>1?v/100:v):null;} // normalisera % till decimal
  return {forsaljning:totF,bvKr:totBv,
    forsaljningDelta:omsN?norm(omsS/omsN):null,bvPct:bvN?norm(bvS/bvN):null,antalDelta:antN?norm(antS/antN):null,
    depts:Object.values(depts).map(function(d){
      var rawBvPct=avg(d.bvPs); var rawFD=avg(d.fDs); var rawAD=avg(d.antDs);
      return Object.assign({},d,{forsaljningDelta:norm(rawFD),bvPct:norm(rawBvPct),antalDelta:norm(rawAD),bvKrFgAr:d.bvKrFgAr||null,bvKrDelta:d.bvKrDelta||null});
    })
  };
}


function calcBvKrDelta(d) {
  if(!d || d.bvKr==null) return null;
  if(d.bvKrFgAr!=null) return d.bvKr - d.bvKrFgAr;
  if(d.forsaljningFgAr==null || d.bvPct==null || d.bvDelta==null) return d.bvKr;
  var bvPct   = Math.abs(d.bvPct)   > 1 ? d.bvPct/100   : d.bvPct;
  var bvDelta = Math.abs(d.bvDelta) > 1 ? d.bvDelta/100 : d.bvDelta;
  return d.bvKr - d.forsaljningFgAr * (bvPct - bvDelta);
}
function render(data, goals, deptGoals, svinnData, eanMap, actions){
  var bvKrDelta = calcBvKrDelta(data);
  var g=goals||{}, dg=deptGoals||{};
  var html='<div class="kgrid">'
    +ktile('Omsättning',data.forsaljningDelta,g.oms||7,'delta',false)
    +ktile('Marginal BV%',data.bvPct,g.marginal||26.2,'pct',false,true)
    +ktile('Marginal BV kr Δ',bvKrDelta,null,'kr_delta',false)
    +ktile('Antal sålda',data.antalDelta,g.antal||5,'delta',false)
    +ktile('Känt svinn',null,g.svinn_k||0.7,'pct',true)
    +'</div>'
    +'<div class="sgrid">'
    +stile('Antal kvitton',null,g.kvitton||5,'delta',false)
    +stile('Snittköp',null,g.snittKop||180,'kr',false)
    +stile('Driftläckage',null,g.driftlackage||3.5,'pct',true)
    +stile('Kundkorgsstorlek',null,g.kundkorg||8,'num',false)
    +stile('Medlemsandel',null,g.medlems||80,'pct',false)
    +'</div>';

  var activeDepts=(data.depts||[]).filter(function(d){return dg[d.code]&&dg[d.code].active;});
  if(activeDepts.length){
    html+='<div class="dept-title">Avdelningsöversikt</div>';
    activeDepts.forEach(function(d){
      var ddg=dg[d.code]||{};
      var c=col(d.forsaljningDelta,ddg.oms||5,false);
      var acts=actions[d.code]||[];
      var svinn5=buildSvinn5(svinnData,d.code,eanMap);
      var tb5=buildTB5(eanMap,d.code);
      var hasSvinn=svinn5.length>0, hasTB=tb5.length>0;

      html+='<div class="dept-card">'
        +'<div class="dept-head">'
        +'<div class="dept-dot '+c+'"></div>'
        +'<div class="dept-nm">'+d.name+'</div>'
        +'<div class="dept-cd">avd.'+d.code+'</div>'
        +'</div>'
        +'<div class="dkpis">'
        +dkpi('Omsättning',d.forsaljningDelta,ddg.oms||5,'delta',false)
        +dkpi('Antal sålda',d.antalDelta,ddg.antal||5,'delta',false)
        +dkpi('Marginal BV%',d.bvPct,ddg.marginal||28,'pct',false,true)
        +dkpi('Marginal BV kr Δ',calcBvKrDelta(d),null,'kr_delta',false)
        +dkpi('Känt svinn',null,ddg.svinn||1.0,'pct',true)
        +'</div>';

      // Actions
      if(acts.length){
        html+='<div class="dept-acts"><div class="acts-ttl">Actions</div>';
        acts.forEach(function(a){
          var done=a.done?'done':'';
          var checkColor=a.done?'var(--green)':'var(--blue)';
          var check=a.done?'✓':'○';
          var cond=a.cond?'<span style="font-style:italic;color:var(--muted)"> · '+a.cond+'</span>':'';
          html+='<div class="act-row '+done+'">'
            +'<span class="act-check" style="color:'+checkColor+'">'+check+'</span>'
            +'<span>'+a.text+cond+'</span>'
            +'</div>';
        });
        html+='</div>';
      }

      // Top 5 tabeller
      if(hasSvinn||hasTB){
        if(hasSvinn&&hasTB){
          html+='<div class="top5-wrap">'+top5SvinnHTML(svinn5)+top5TbHTML(tb5)+'</div>';
        } else {
          html+='<div class="top5-single">'+(hasSvinn?top5SvinnHTML(svinn5):top5TbHTML(tb5))+'</div>';
        }
      }

      html+='</div>'; // dept-card
    });
  }

  // Lägg till trenddiagram-container
  html += '<div id="w-trends" style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem">'
    + '<div style="font-size:12px;font-weight:600;color:var(--blue);margin-bottom:1rem">Trender — rullande 8-veckors medel × 52</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem">'
    + '<div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Omsättning (Mkr årstakt)</div><div style="position:relative;height:140px"><canvas id="wc-oms"></canvas></div></div>'
    + '<div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Antal sålda (st årstakt)</div><div style="position:relative;height:140px"><canvas id="wc-antal"></canvas></div></div>'
    + '<div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Bruttovinst %</div><div style="position:relative;height:140px"><canvas id="wc-bv"></canvas></div></div>'
    + '<div><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Antal kvitton (årstakt)</div><div style="position:relative;height:140px"><canvas id="wc-kvitton"></canvas></div></div>'
    + '</div></div>';

  document.getElementById('main').innerHTML=html;
  if(currentStore!=="all") drawWidgetTrends(currentStore);
}


// ── TRENDDIAGRAM ─────────────────────────────────────────────────────
var wCharts = {};
var wRatData = null;

async function loadRatDataWidget(storeId) {
  if(wRatData) return wRatData;
  const {data, error} = await SB.from('os20_data').select('period_key,data').order('period_key').limit(500);
  if(error || !data) return {};
  wRatData = {};
  data.forEach(function(r) {
    var m = r.period_key.match(/(\d{4})-V(\d+)/);
    if(!m) return;
    var yr = parseInt(m[1]), wk = parseInt(m[2]);
    wRatData[r.period_key] = {year:yr, week:wk, stores:{}};
    Object.entries(r.data||{}).forEach(function([sid,sd]) {
      if(sd.forsaljning!=null) wRatData[r.period_key].stores[sid] = {
        oms: sd.forsaljning||0, antal: sd.antalSt||0,
        bvKr: sd.bvKr||0, bvPct: sd.bvPct||0, kvitton: sd.kvitton||0
      };
    });
  });
  return wRatData;
}

function getRolling8Widget(allPeriods, data, periodIdx, storeId, metric) {
  var sumOms=0, sumVal=0, count=0;
  for(var back=0; back<8; back++) {
    var pk = allPeriods[periodIdx-back];
    if(!pk) break;
    var sd = data[pk].stores[storeId];
    if(!sd) continue;
    if(metric==='oms')     { sumOms+=sd.oms; sumVal+=sd.oms; }
    if(metric==='antal')   { sumOms+=sd.oms; sumVal+=sd.antal; }
    if(metric==='bvpct')   { sumOms+=sd.oms; sumVal+=sd.bvKr; }
    if(metric==='kvitton') { sumOms+=sd.oms; sumVal+=sd.kvitton; }
    count++;
  }
  if(count<4) return null;
  if(metric==='bvpct') return sumOms>0 ? (sumVal/sumOms)*100 : null;
  return (sumVal/count)*52;
}

async function drawWidgetTrends(storeId) {
  if(typeof Chart === 'undefined') return;
  var data = await loadRatDataWidget(storeId);
  if(!data || !Object.keys(data).length) return;

  var allPeriods = Object.keys(data).sort();
  var curYear = new Date().getFullYear();
  var prevYear = curYear - 1;
  var COLORS = {};
  COLORS[prevYear] = '#94a3b8';
  COLORS[curYear]  = '#E20000';

  var configs = [
    {id:'wc-oms',     metric:'oms',     unit:'Mkr', dec:1, scale:function(v){return Math.round(v/1000000*10)/10;}},
    {id:'wc-antal',   metric:'antal',   unit:'st',  dec:0, scale:Math.round},
    {id:'wc-bv',      metric:'bvpct',   unit:'%',   dec:1, scale:function(v){return Math.round(v*10)/10;}},
    {id:'wc-kvitton', metric:'kvitton', unit:'st',  dec:0, scale:Math.round},
  ];

  configs.forEach(function(cfg) {
    var canvas = document.getElementById(cfg.id);
    if(!canvas) return;
    if(wCharts[cfg.id]) { wCharts[cfg.id].destroy(); delete wCharts[cfg.id]; }

    var datasets = [prevYear, curYear].filter(function(yr) {
      return allPeriods.some(function(k){return data[k].year===yr;});
    }).map(function(yr) {
      var pts = allPeriods
        .filter(function(k){return data[k].year===yr;})
        .map(function(key) {
          var idx = allPeriods.indexOf(key);
          var val = getRolling8Widget(allPeriods, data, idx, storeId, cfg.metric);
          if(val==null) return null;
          return {x: data[key].week, y: cfg.scale(val)};
        }).filter(Boolean);
      return {
        label: String(yr), data: pts,
        borderColor: COLORS[yr]||'#888',
        backgroundColor: 'transparent',
        borderWidth: yr===curYear?2.5:1.5,
        borderDash: yr===prevYear?[5,3]:[],
        pointRadius:0, tension:0.35, parsing:false
      };
    });

    wCharts[cfg.id] = new Chart(canvas, {
      type:'line', data:{datasets:datasets},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false}, tooltip:{callbacks:{
          title:function(ctx){return 'Vecka '+ctx[0].parsed.x;},
          label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toFixed(cfg.dec)+' '+cfg.unit;}
        }}},
        scales:{
          x:{type:'linear',min:1,max:52,ticks:{stepSize:8,font:{size:9}},grid:{color:'rgba(0,0,0,.04)'}},
          y:{ticks:{font:{size:9},callback:function(v){return v.toFixed(cfg.dec);}},grid:{color:'rgba(0,0,0,.04)'}}
        }
      }
    });
  });
}

async function load(){
  setS('spin','Hämtar data...');
  try{
    var q1=sbGet('report_data','select=period_key,data&order=period_key.desc&limit=9');
    var q2=currentStore!=='all'?sbGet('svinn_data','select=period_key,data&order=period_key.desc&limit=1'):Promise.resolve([]);
    var q3=sbGet('kpi_config','select=ean_dept_map&id=eq.global');
    var results=await Promise.all([q1,q2,q3]);
    var reports=results[0], svinnRows=results[1], kpiConf=results[2];

    if(!reports.length) throw new Error('Ingen data tillgänglig');
    var latestPK=reports[0].period_key;

    var allData={};
    reports.forEach(function(r){Object.assign(allData,r.data);});

    var data,goals=null,deptGoals=null,actions={},svinnData=[];
    var eanMap=(kpiConf[0]&&kpiConf[0].ean_dept_map)||{};

    if(currentStore==='all'){
      data=aggregate(allData);
    } else {
      data=allData[currentStore]||{};
      var r1=await sbGet('store_settings','select=store_goals,dept_goals&store_id=eq.'+currentStore);
      var r2=await sbGet('actions','select=dept_code,data&store_id=eq.'+currentStore);
      if(r1[0]){goals=r1[0].store_goals;deptGoals=r1[0].dept_goals;}
      r2.forEach(function(a){actions[a.dept_code]=a.data||[];});
      if(svinnRows[0]){
        var storeRows=svinnRows[0].data[currentStore]||[];
        storeRows.forEach(function(r){svinnData.push(r);});
      }
    }

    var name=currentStore==='all'?'Östenssons Totalt':(STORES[currentStore]||currentStore);
    document.getElementById('store-name').textContent=name;
    document.getElementById('period-label').textContent=latestPK.replace('-V',' · V');
    render(data,goals,deptGoals,svinnData,eanMap,actions);

    var now=new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ts').textContent='↻ '+now;
    document.getElementById('footer').textContent='Östenssons Butiksportal · Senast uppdaterad '+now+' · Auto-refresh var 15 min';
    setS('ok','Data hämtad · '+latestPK);
  } catch(e){
    setS('','Fel: '+e.message);
    document.getElementById('main').innerHTML='<div style="padding:2rem;text-align:center;color:var(--redd)">⚠ '+e.message+'</div>';
  }
}

function setS(cls,txt){
  document.getElementById('sdot').className='sdot '+cls;
  document.getElementById('stxt').textContent=txt;
}
function changeStore(v){
  currentStore=v;
  var u=new URL(window.location);
  u.searchParams.set('store',v);
  window.history.pushState({},'',u);
  load();
}
load();
setInterval(load,15*60*1000);
</script>
