name: Deploy Supabase Functions
on:
  push:
      branches: [main]
          paths:
                - 'supabase/functions/**'
                jobs:
                  deploy:
                      runs-on: ubuntu-latest
                          steps:
                                - uses: actions/checkout@v4
                                      - uses: supabase/setup-cli@v1
                                              with:
                                                        version: latest
                                                              - name: Deploy monday-auto-send
                                                                      run: supabase functions deploy monday-auto-send --project-ref cnifrizdioiwlvgbxsqs
                                                                              env:
                                                                                        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
